<section id="waitlist" style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
  <h2 style="text-align:center; font-family: sans-serif; font-size: 32px; margin-bottom: 10px;">
    Gå med i Nexus Sportmatch väntelistan
  </h2>
  <p style="text-align:center; font-family: sans-serif; font-size: 18px; margin-bottom: 30px;">
    Fyll i dina uppgifter nedan för att säkra tidig åtkomst till appen.
  </p>

  <iframe 
    data-tally-src="https://tally.so/embed/9qvJ7V?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
    loading="lazy" 
    width="100%" 
    height="200" 
    frameborder="0" 
    marginheight="0" 
    marginwidth="0" 
    title="Nexus Sportmatch – Väntelista">
  </iframe>
</section>

<script>
  var d=document,
      w="https://tally.so/widgets/embed.js",
      v=function(){
        if(typeof Tally!=="undefined"){
          Tally.loadEmbeds();
        } else {
          d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){
            e.src=e.dataset.tallySrc;
          });
        }
      };

  if(typeof Tally!=="undefined") {
    v();
  } else if(d.querySelector('script[src="'+w+'"]')==null){
    var s=d.createElement("script");
    s.src=w;
    s.onload=v;
    s.onerror=v;
    d.body.appendChild(s);
  }
</script>
