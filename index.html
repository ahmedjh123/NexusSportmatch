<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Sportmatch – Väntelista</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0A0F1F;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        #waitlist {
            background: white;
            color: black;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            border-radius: 12px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <h1>Nexus Sportmatch – Väntelista</h1>
    <p>Fyll i dina uppgifter nedan för att säkra tidig åtkomst till appen.</p>

    <section id="waitlist">
        <iframe 
            data-tally-src="https://tally.so/embed/9qvJ7V?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
            loading="lazy"
            width="100%"
            height="400"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            title="Nexus Sportmatch – Väntelista">
        </iframe>
    </section>

    <script>
        var d=document,
            w="https://tally.so/widgets/embed.js",
            v=function(){
                if(typeof Tally!=="undefined"){
                    Tally.loadEmbeds();
                } else {
                    d.querySelectorAll("iframe[data-tally-src]:not([src])")
                    .forEach(function(e){ e.src=e.dataset.tallySrc; });
                }
            };

        if(typeof Tally!=="undefined") {
            v();
        } else if(d.querySelector('script[src="'+w+'"]')==null){
            var s=d.createElement("script");
            s.src=w;
            s.onload=v;
            s.onerror=v;
            d.body.appendChild(s);
        }
    </script>

</body>
</html>
