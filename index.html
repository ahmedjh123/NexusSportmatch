<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Sportmatch – Väntelista</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0A0F1F 0%, #1E293B 100%);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 20px;
            opacity: 0.9;
        }

        #waitlist {
            background: #ffffff;
            color: #000;
            max-width: 600px;
            margin: 40px auto;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        #waitlist h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        #waitlist p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <header>
        <h1>Nexus Sportmatch</h1>
        <p>Hitta träningspartners. Spela matcher. Bygg gemenskap.</p>
    </header>

    <section id="waitlist">
        <h2>Gå med i Nexus Sportmatch väntelistan</h2>
        <p>Fyll i dina uppgifter nedan för att säkra tidig åtkomst till appen.</p>

        <iframe 
            data-tally-src="https://tally.so/embed/9qvJ7V?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
            loading="lazy" 
            width="100%" 
            height="200" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0" 
            title="Nexus Sportmatch – Väntelista">
        </iframe>
    </section>

    <script>
        var d=document,
            w="https://tally.so/widgets/embed.js",
            v=function(){
                if(typeof Tally!=="undefined"){
                    Tally.loadEmbeds();
                } else {
                    d.querySelectorAll("iframe[data-tally-src]:not([src])")
                    .forEach(function(e){ e.src=e.dataset.tallySrc; });
                }
            };

        if(typeof Tally!=="undefined") {
            v();
        } else if(d.querySelector('script[src="'+w+'"]')==null){
            var s=d.createElement("script");
            s.src=w;
            s.onload=v;
            s.onerror=v;
            d.body.appendChild(s);
        }
    </script>

    <footer>
        © 2026 Nexus Sportmatch – Alla rättigheter reserverade.
    </footer>

</body>
</html>
